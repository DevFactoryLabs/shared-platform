name: Main Branch Analysis

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for MinVer and SonarCloud blame info

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          source-url: https://nuget.pkg.github.com/devfactorylabs/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore
        run: dotnet restore shared-platform.slnx

      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Build and analyze
        run: |
          dotnet sonarscanner begin \
            /k:"${{ vars.SONAR_PROJECT_KEY }}" \
            /o:"${{ vars.SONAR_ORGANIZATION_KEY }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.cobertura.reportsPaths="${{ github.workspace }}/coverage-results/**/coverage.cobertura.xml"

          dotnet build shared-platform.slnx --no-restore --configuration Release

          dotnet test shared-platform.slnx \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ./coverage-results \
            --logger "trx;LogFileName=test-results.trx"

          echo "Coverage files found:"
          find ./coverage-results -name "coverage.cobertura.xml" | while read f; do
            echo "  $f"
            grep -o 'line-rate="[^"]*"' "$f" | head -1
          done

          dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
