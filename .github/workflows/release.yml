name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore shared-platform.slnx

      - name: Build
        run: dotnet build shared-platform.slnx --no-restore --configuration Release /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: |
          dotnet test shared-platform.slnx \
            --no-build \
            --configuration Release

      - name: Pack
        run: |
          dotnet pack shared-platform.slnx \
            --no-build \
            --configuration Release \
            --output ./nupkgs \
            /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" \
            --source "https://nuget.pkg.github.com/devfactorylabs/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
